<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2c2c2c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>艾莉亚 — 资料档案</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;color:#333;font-family:'Noto Serif SC','Georgia','PingFang SC',serif;min-height:100vh;min-height:100dvh;overflow-x:hidden}

/* ===== Top Bar ===== */
.top{background:#2c2c2c;color:#ccc;padding:10px 16px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;min-height:48px}
.top h1{font-size:0.95rem;color:#e8d5a3;font-weight:normal;letter-spacing:1.5px}
.top .mid{font-size:0.72rem;color:#888;display:block;white-space:nowrap}
.top .sub{font-size:0.72rem;color:#666;margin-left:auto}
@media(max-width:420px){
  .top{padding:8px 12px;gap:6px}
  .top h1{font-size:0.85rem}
  .top .mid{font-size:0.65rem}
  .top .sub{display:none}
}

/* ===== Tabs ===== */
.tabs{display:flex;gap:0;padding:0;background:#e8e0d0;border-bottom:1px solid #ccc;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;position:sticky;top:48px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 0 auto;padding:10px 12px;background:transparent;border:none;color:#888;font-size:0.78rem;cursor:pointer;white-space:nowrap;font-family:inherit;text-align:center;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;min-width:0}
.tab:active{opacity:.7}
.tab.active{color:#222;border-bottom-color:#2c2c2c;font-weight:600}
@media(max-width:420px){
  .tab{font-size:0.72rem;padding:8px 8px}
}

/* ===== Main ===== */
main{max-width:960px;margin:0 auto;padding:16px;padding:clamp(12px,4vw,24px)}
.panel{display:none}
.panel.active{display:block}

/* ===== Doc Cards ===== */
.doc{border:1px solid #ddd;border-radius:6px;margin-bottom:12px;background:#fff;overflow:hidden}
.doc-head{background:#f8f6f0;padding:10px 14px;font-size:0.82rem;color:#555;border-bottom:1px solid #ddd;display:flex;gap:8px;align-items:center}
.doc-body{padding:14px;font-size:0.88rem;line-height:1.8;color:#444}
.doc-body hr,.doc-body div:has(>hr){display:none}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:0.84rem;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th{background:#f0ece4;text-align:left;padding:6px 10px;border:1px solid #ddd;color:#555;white-space:nowrap}
td{padding:6px 10px;border:1px solid #ddd;color:#444}
tr:nth-child(even) td{background:#fafaf5}

/* ===== Grids ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));gap:10px}
@media(max-width:500px){
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
}
.item{border:1px solid #eee;padding:10px 12px;background:#fcfcfa;border-radius:4px}
.item strong{color:#333;display:block;margin-bottom:2px}
.item .mute{color:#999;font-size:0.78rem}

/* ===== Relations ===== */
.rels{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.rel{display:inline-flex;gap:6px;background:#f0ece4;padding:3px 10px;border-radius:4px;font-size:0.82rem}
.rel .nm{color:#333}
.rel .rd{color:#888;font-size:0.78rem}

/* ===== Stats ===== */
.stat{display:flex;gap:10px;align-items:center;margin-bottom:6px}
.stat label{color:#999;width:70px;flex-shrink:0;text-align:right;font-size:0.82rem}
.stat .bar{flex:1;min-width:0;height:6px;background:#eee;border-radius:3px;overflow:hidden}
.stat .bar .fill{height:100%;border-radius:3px;background:#6a8}
.stat .val{font-size:0.82rem;color:#555;flex-shrink:0;min-width:auto}

/* ===== Tags ===== */
.tag{display:inline-block;background:#e8e0d0;padding:2px 8px;border-radius:3px;font-size:0.78rem;color:#666;margin-right:4px;margin-bottom:3px}

/* ===== Misc ===== */
.loading{color:#999;padding:24px 16px;text-align:center;font-size:0.88rem}
#ft{text-align:center;font-size:0.75rem;color:#aaa;margin-top:24px;padding-bottom:24px}
#rf{position:fixed;bottom:16px;right:16px;background:#2c2c2c;color:#ccc;border:1px solid #555;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-family:inherit;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#rf:hover{background:#444;color:#fff}
#rf:active{transform:scale(.95)}
@media(max-width:420px){
  #rf{bottom:10px;right:10px;padding:8px 14px;font-size:0.78rem}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* ===== Modals ===== */
#char-overlay,#bestiary-overlay,#org-overlay,#equip-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:flex-start;padding:env(safe-area-inset-top,12px) 12px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;max-width:640px;width:100%;margin:auto;margin-top:clamp(12px,8vh,40px);box-shadow:0 4px 24px rgba(0,0,0,.15)}
.modal .doc{margin-bottom:12px;border-radius:6px}
.modal .doc:last-child{margin-bottom:0}
@media(max-width:420px){
  #char-overlay,#bestiary-overlay,#org-overlay,#equip-overlay{padding:8px}
  .modal{padding:12px;border-radius:8px;margin-top:8px}
}

/* ===== Adventurer Profile Layout ===== */
@media(max-width:640px){
  #p-eriya > div[style*="grid-template-columns:200px"]{grid-template-columns:1fr !important;gap:12px}
  #p-eriya > div[style*="grid-template-columns:200px"] > div:first-child{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px !important
  }
  #p-eriya > div[style*="grid-template-columns:200px"] > div:first-child > div{
    margin:0 !important
  }
}

/* ===== Equipment Quality Colors ===== */
.q-white{color:#999}.q-blue{color:#369}.q-purple{color:#93c}.q-gold{color:#c83}.q-red{color:#c33}
.qb-white{border-color:#999 !important;background:#fafafa !important}
.qb-blue{border-color:#369 !important;background:#eef5ff !important}
.qb-purple{border-color:#93c !important;background:#f8eefd !important}
.qb-gold{border-color:#c83 !important;background:#fff8e8 !important}
.qb-red{border-color:#c33 !important;background:#fff0ee !important}

/* ===== Equipment Tree ===== */
.tree-wrap{overflow-x:auto;padding:8px 0}
.tree{display:flex;align-items:center;gap:4px;font-size:0.8rem;flex-wrap:wrap}
.tree-node{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.tree-node:hover{border-color:#666;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.tree-node.active-node{border-width:2px}
.tree-node .q{border-radius:3px;padding:1px 5px;font-size:0.72rem}
.tree-arrow{color:#aaa;font-size:1.1rem;flex-shrink:0}

/* ===== Equipment Item Cards ===== */
.eq-slot-label{font-size:0.78rem;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.eq-card{border:1px solid #ddd;border-radius:8px;padding:12px;background:#fff;cursor:pointer;transition:all .15s;position:relative}
.eq-card:hover{border-color:#888;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.eq-card.in-use{border-width:2px}
.eq-card .eq-icon{font-size:1.8rem;margin-bottom:6px}
.eq-card .eq-name{font-weight:bold;margin-bottom:4px;font-size:0.9rem}
.eq-card .eq-quality{font-size:0.72rem;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px}
.eq-card .eq-stat{font-size:0.8rem;color:#666;margin-bottom:2px}
.eq-card .eq-status{position:absolute;top:8px;right:8px;font-size:0.68rem;padding:2px 6px;border-radius:3px;background:#e8e0d0;color:#666}
.eq-card .eq-status.in-use{background:#d4edda;color:#155724}
.eq-card .eq-status.obsolete{background:#f8d7da;color:#721c24}

/* ===== Section Divider ===== */
.section-divider{font-size:0.78rem;color:#888;padding:8px 0;margin:12px 0 8px;border-bottom:1px dashed #ddd}

/* ===== Unlocked Slot ===== */
.slot-empty{border:1px dashed #ccc;border-radius:8px;padding:12px;background:#fafaf8;text-align:center;color:#aaa;font-size:0.82rem}

/* ===== Upcoming Slot ===== */
.slot-locked{border:1px dashed #ddd;border-radius:8px;padding:12px;background:#f8f8f8;text-align:center;color:#bbb;font-size:0.82rem}
</style>
</head>
<body>

<div class="top">
  <h1>✦ ELDEA ARCHIVE</h1>
  <span class="mid">エルデア大陆 · 资料档案</span>
  <span class="sub">v0.13.0</span>
</div>

<div class="tabs">
  <button class="tab active" data-p="eriya">冒险者档案</button>
  <button class="tab" data-p="characters">人物</button>
  <button class="tab" data-p="equipment">装备</button>
  <button class="tab" data-p="questline">任务记录</button>
  <button class="tab" data-p="bestiary">生物图鉴</button>
  <button class="tab" data-p="organizations">组织</button>
  <button class="tab" data-p="world">世界观</button>
</div>

<main>
  <div class="panel active" id="p-eriya"></div>
  <div class="panel" id="p-characters"></div>
  <div class="panel" id="p-equipment"></div>
  <div class="panel" id="p-questline"></div>
  <div class="panel" id="p-bestiary"></div>
  <div class="panel" id="p-organizations"></div>
  <div class="panel" id="p-world"></div>
  <div id="ft"></div>
</main>
<button id="rf" onclick="loadAll()">🔄 刷新</button>

<script>
const F = ['eriya','characters','equipment','questline','bestiary','organizations','world'];
const P = n => 'memory/'+n+'.md?'+Date.now();

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab,.panel').forEach(e=>e.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('p-'+t.dataset.p).classList.add('active');
    localStorage.setItem('p',t.dataset.p);
  });
});

const C={};
function gc(k){const d=localStorage.getItem('c_'+k);if(!d)return null;const j=JSON.parse(d);return Date.now()-j.t<300000?j.v:null}
function sc(k,v){try{localStorage.setItem('c_'+k,JSON.stringify({v,t:Date.now()}))}catch{}}

// 🔧 Parse: - key：value (fullwidth or halfwidth colon, no space after colon)
// Strips **bold** markers from keys.
function kv(text) {
  const r = {};
  text.split('\n').forEach(l => {
    const m = l.match(/^- (.+?)[\uff1a:](.+)/);
    if (m) {
      let k = m[1].trim();
      k = k.replace(/^\*+\s*|\s*\*+$/g, '').trim();
      r[k] = m[2].trim();
    }
  });
  return r;
}
// 🔧 Parse: ## Header → content
function sec(text) {
  const r={};let c=null;
  text.split('\n').forEach(l=>{const m=l.match(/^## (.+)/);if(m){c=m[1].trim();r[c]=[]}else if(c)r[c].push(l)});
  return Object.fromEntries(Object.entries(r).map(([k,v])=>[k,v.join('\n').trim()]));
}
// 🔧 Parse markdown table
function tbl(text){
  let hd=[],rows=[],inT=false;
  text.split('\n').forEach(l=>{
    const cells=l.split('|').filter(c=>c.trim()).map(c=>c.trim());
    if(l.startsWith('|')&&cells.length&&!cells.some(c=>/^-{3,}$/.test(c))){if(!inT){hd=cells;inT=true}else rows.push(cells)}else inT=false
  });
  return {hd,rows};
}
function thtml(t){return t.hd.length?'<table><thead><tr>'+t.hd.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+t.rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>':''}

// === Quality helpers ===
const QUAL_COLORS = {
  '普通(白色)':{text:'q-white',bg:'qb-white',label:'白'},
  '普通（白色）':{text:'q-white',bg:'qb-white',label:'白'},
  '普通':{text:'q-white',bg:'qb-white',label:'白'},
  '精良（蓝色）':{text:'q-blue',bg:'qb-blue',label:'蓝'},
  '精良(蓝色)':{text:'q-blue',bg:'qb-blue',label:'蓝'},
  '精良':{text:'q-blue',bg:'qb-blue',label:'蓝'},
  '稀有（紫色）':{text:'q-purple',bg:'qb-purple',label:'紫'},
  '稀有(紫色)':{text:'q-purple',bg:'qb-purple',label:'紫'},
  '稀有':{text:'q-purple',bg:'qb-purple',label:'紫'},
  '优良（绿色）':{text:'q-green',bg:'qb-green',label:'绿'},
  '优良':{text:'q-green',bg:'qb-green',label:'绿'},
  '史诗（金色）':{text:'q-gold',bg:'qb-gold',label:'金'},
  '史诗(金色)':{text:'q-gold',bg:'qb-gold',label:'金'},
  '史诗':{text:'q-gold',bg:'qb-gold',label:'金'},
  '传说（红色）':{text:'q-red',bg:'qb-red',label:'红'},
  '传说(红色)':{text:'q-red',bg:'qb-red',label:'红'},
  '传说':{text:'q-red',bg:'qb-red',label:'红'},
  '特殊（故事道具）':{text:'q-rainbow',bg:'qb-rainbow',label:'彩'},
  '特殊':{text:'q-rainbow',bg:'qb-rainbow',label:'彩'},
};
const QUAL_ORDER = {'白':1,'绿':2,'蓝':3,'紫':4,'金':5,'红':6,'彩':7};
function getQualInfo(q){
  if(!q)return QUAL_COLORS['普通'];
  for(const[k] of Object.entries(QUAL_COLORS)){
    if(q.includes(k.replace(/[()（）]/g,'')))return QUAL_COLORS[k];
  }
  return QUAL_COLORS['普通'];
}
function qColor(q){
  const qi = getQualInfo(q);
  return qi ? qi.text : 'q-white';
}
function qBg(q){
  const qi = getQualInfo(q);
  return qi ? qi.bg : 'qb-white';
}
function qLabel(q){
  const qi = getQualInfo(q);
  return qi ? qi.label : '白';
}

// === Equipment parse ===
const SLOT_ICONS = {'武器':'🗡️','饰品':'💎','防具':'🛡️','道具':'🎒','戒指':'💍','护腕':'🖐️','腰带':'🎀','靴子':'👢','披风':'🧣'};
const SLOT_ORDER = ['武器','饰品','防具','戒指','护腕','腰带','靴子','披风','道具'];

function parseEquipment(text){
  const sections = text.split(/^##\s+/m);
  const overviewText = sections.find(s=>s.trimLeft().startsWith('一、升级图谱'));
  const itemsText = sections.find(s=>s.trimLeft().startsWith('二、已点亮'));
  
  // Parse upgrade trees from overview
  const trees = {};
  if(overviewText){
    const treeBlocks = overviewText.split(/^###\s+/m).filter(Boolean);
    treeBlocks.forEach(block => {
      const lines = block.split('\n');
      const slotMatch = lines[0].match(/^(武器|饰品|防具|其他装备)/);
      if(slotMatch){
        trees[slotMatch[1]] = {raw: lines.join('\n')};
      }
    });
  }
  
  // Parse individual items from the "已点亮装备" section
  const items = [];
  if(itemsText){
    // Split into category blocks by ### (武器栏, 饰品栏, etc.)
    const catBlocks = itemsText.split(/^###\s+/m).filter(Boolean);
    catBlocks.forEach(catBlock => {
      const lines = catBlock.split('\n');
      const catName = lines[0].trim();
      const body = lines.slice(1).join('\n');
      
      // Determine slot from category name
      let catSlot = '';
      if(catName.includes('武器')) catSlot = '武器';
      else if(catName.includes('饰品')) catSlot = '饰品';
      else if(catName.includes('防具')) catSlot = '防具';
      else if(catName.includes('道具')) catSlot = '道具';
      
      // Split body into individual items by #### or ---
      const itemBlocks = body.split(/^#{3,4}\s+/m).filter(Boolean);
      itemBlocks.forEach(ib => {
        // First line is item name (may include ## header) 
        const ibLines = ib.split('\n');
        let nameRaw = ibLines[0].trim();
        // Remove leading ## marks if any
        nameRaw = nameRaw.replace(/^#+\s*/,'');
        // Remove parenthetical quality hint from name line
        const nameClean = nameRaw.replace(/^✨\s*/,'').replace(/[（(][^)）]+[)）]\s*$/,'').trim();
        if(!nameClean) return;
        
        const itemBlock = ibLines.slice(1).join('\n');
        const item = {name: nameClean, raw: itemBlock};
        
        // Get quality from name line parenthetical
        const qParen = nameRaw.match(/[（(]([^)）]+)[)）]\s*$/);
        if(qParen) item.quality = qParen[1];
        
        item.slot = catSlot;
        
        // Parse key-values from item block
        const kvs = kv(itemBlock);
        if(kvs['品质']) item.quality = kvs['品质'];
        if(kvs['状态']) item.status = kvs['状态'];
        if(kvs['获取方式']) item.source = kvs['获取方式'];
        if(kvs['获取时间']) item.when = kvs['获取时间'];
        if(kvs['部位']) item.slot2 = kvs['部位'];
        
        // Parse property section
        const propMatch = itemBlock.match(/\*\*属性\*\*([\s\S]*?)(?=\n\*\*)/);
        if(propMatch){
          item.props = propMatch[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>l.replace(/^-\s*/,'').trim()).filter(Boolean);
        }
        
        // Parse appearance
        const lookMatch = itemBlock.match(/\*\*外观\*\*([\s\S]*?)(?=\n\*\*|$)/);
        if(lookMatch) item.look = lookMatch[1].trim();
        
        // Parse notes
        const notesMatch = itemBlock.match(/\*\*备注\*\*([\s\S]*?)(?=\n\n##|\n---|$)/);
        if(notesMatch) item.notes = notesMatch[1].trim();
        
        items.push(item);
      });
    });
  }
  
  return {items, trees};
}

// === Equipment Tree Renderer ===
function renderTree(treeText, items){
  // Extract code block
  const lines = treeText.split('\n');
  const code = []; let inBlock = false;
  lines.forEach(l => { const t = l.trim(); if(t.startsWith('\x60\x60\x60')) inBlock = !inBlock; else if(inBlock) code.push(t); });
  
  // Parse horizontally arranged ASCII boxes
  // Each tier has: top ┌─┐, middle │name│, bottom └─┘ plus optional info below
  const topIdx = code.findIndex(l => l.startsWith('\u250c') || l.startsWith('\u250f'));
  if(topIdx < 0) return '<div style="color:#999;font-size:0.82rem">暂无升级路线数据</div>';
  
  // Parse column by column: each box is delimited by ┐ ┌ or ┘ └ boundaries
  // On each line, split where corner chars are
  const boxLines = []; let info = null;
  for(let i = topIdx; i < code.length; i++){
    const l = code[i];
    if(l.startsWith('\u250c')||l.startsWith('\u250f')||l.startsWith('\u2502')||l.startsWith('\u2503')||l.startsWith('\u2514')||l.startsWith('\u2518')){
      boxLines.push(l);
    } else if(l.trim() && !info){
      info = code.slice(i).filter(l=>l.trim()&&!l.startsWith('\u2500'));
      break;
    }
  }
  
  if(!boxLines.length) return '<div style="color:#999;font-size:0.82rem">暂无升级路线数据</div>';
  
  // Parse each line into columns by splitting at box corner boundaries
  // Find all box positions from the top line
  const tops = boxLines.filter(l => l.startsWith('\u250c')||l.startsWith('\u250f'));
  if(!tops.length) return '<div style="color:#999;font-size:0.82rem">解析失败</div>';
  
  // For each box in the top line, find the start and end column
  const cols = [];
  tops[0].split('').forEach((ch, ci) => {
    if(ch === '\u250c' || ch === '\u250f') {
      // Find the closing ┐ or ┓ at the same height
      const line = tops[0];
      let start = ci;
      let width = line.indexOf('\u2557', ci) - start;  // ┗ / ┛
      if(width <= 0) width = line.indexOf('\u2510', ci) - start; // ┐
      if(width <= 0) { const s = line.slice(ci+1); width = s.indexOf('\u250c') - 1; if(width <= 0) width = s.indexOf('\u2510') - 1; if(width <= 0) width = Math.max(8, line.match(/^.+'[']/.test) + 1); } // fallback
      cols.push({start, width: Math.max(8, width)});
    }
  });
  
  // Actually, simpler approach: split each box-line by identifying box boundaries
  // Find all ┌-aligned horizontal positions
  function findBoxes(line){
    const boxes = []; let inBox = false, start = 0;
    for(let j = 0; j < line.length; j++){
      if(line[j] === '\u250c' || line[j] === '\u250f') { inBox = true; start = j; }
      else if(inBox && (line[j] === '\u2510' || line[j] === '\u2557')) { inBox = false; boxes.push({s:start, e:j+1}); }
    }
    return boxes;
  }
  
  // Use the top-most box line to determine column count and positions
  let boxPositions = [];
  for(const l of boxLines){
    if(l.startsWith('\u250c') || l.startsWith('\u250f')){
      const b = findBoxes(l);
      if(b.length > boxPositions.length) boxPositions = b;
    }
  }
  
  if(!boxPositions.length) return '<div style="color:#999;font-size:0.82rem">解析失败2</div>';
  
  const nodes = [];
  const notes = info && info.length ? info.map(l => l.trim()).filter(Boolean) : [];
  
  boxPositions.forEach((pos, idx) => {
    // Extract name from each box using the middle line
    let name = '', quality = '\u666e\u901a', hasStar = false;
    for(const l of boxLines){
      if(l.startsWith('\u2502') || l.startsWith('\u2503')){
        const slice = l.slice(pos.s, pos.e);
        const content = slice.replace(/[││\u2502\u2503\s]/g,'').trim();
        if(content && !name) {
          hasStar = content.includes('\u2b50');
          name = content.replace(/\u2b50/g,'').trim();
          // Check if this is the quality line (in parens)
          if(content.match(/^[（(]/)) quality = content.replace(/[（(）)]/g,'').trim();
        }
        // Second middle line typically has quality
        if(content.match(/^[（(]/)) quality = content.replace(/[（）()]/g,'').trim();
      }
    }
    
    // Check the full content for quality info
    const allMiddle = boxLines.filter(l=>l.startsWith('\u2502')||l.startsWith('\u2503'));
    if(allMiddle.length >= 2){
      const ql = allMiddle[1].slice(boxPositions[idx].s, boxPositions[idx].e);
      const qm = ql.match(/[（(]([^）)]+)[）)]/);
      if(qm) quality = qm[1];
    }
    
    // Get note from info lines
    let note = '';
    if(notes.length > 0) {
      if(notes[0].includes('—')) note = '';
      else if(idx < notes.length) note = notes[idx];
      else note = notes[notes.length-1];
    }
    
    // Match with items
    const it = items.find(i => name && (i.name.includes(name) || name.includes(i.name)));
    if(it) { quality = it.quality || quality; }
    
    nodes.push({name: name || '???', quality, hasStar, isUnlocked: it ? true : (name && !name.includes('???') && name.length > 0), note, tierIdx: idx});
  });
  
  // Pretty loose fallback: just use item names and notes from the text
  if(!nodes.length || nodes.every(n => !n.name)) {
    // Try extracting from code lines directly
    code.forEach(l => {
      const items_match = /│(.+?)│/.exec(l);
      if(items_match) {
        // Split by │→│ or │ │ patterns
        const parts = l.match(/│([^│]+)│/g);
        if(parts) {
          parts.forEach(p => {
            const n = p.replace(/[││\s]/g,'').trim();
            if(n && !nodes.find(x=>x.name===n)) {
              const hasStar = n.includes('\u2b50');
              const it = items.find(i => i.name.includes(n.replace(/\u2b50/g,'').trim()) || n.includes(i.name));
              nodes.push({name: n.replace(/\u2b50/g,'').trim(), quality: it ? (it.quality||'\u666e\u901a') : '\u666e\u901a', hasStar, isUnlocked: !!it, note: ''});
            }
          });
        }
      }
    });
  }
  
  if(!nodes.length || nodes.every(n => !n.name)) return '<div style="color:#999;font-size:0.82rem">暂无升级路线数据</div>';
  
  // Merge source notes
  if(notes.length && notes[0] && !/^$|^—$/.test(notes[0])){
    nodes.forEach((n, i) => {
      if(!n.note && i < notes.length && notes[i] && !/^$|^—$/.test(notes[i]))
        n.note = notes[i];
    });
  }
  
  // Render vertical progression
  return '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px 4px">' +
    nodes.map((n, i) => {
      const qi = getQualInfo(n.quality), cls = qBg(n.quality);
      const it = items.find(x => n.name && (x.name.includes(n.name) || n.name.includes(x.name)));
      const note = n.note || (it ? it.source : '');
      const tierLabel = (i + 1) + '\u9636';
      const isCurrent = n.hasStar || (it && (it.status === '\u4f7f\u7528\u4e2d' || it.status === '\u4f69\u6234\u4e2d'));
      const badge = isCurrent ? '<div style="position:absolute;top:-8px;right:-8px;background:#c90;color:#fff;font-size:0.6rem;padding:2px 7px;border-radius:4px;font-weight:bold">\u2605\u5f53\u524d</div>'
        : n.isUnlocked ? '<div style="position:absolute;top:-8px;right:-8px;background:#396;color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:4px">\u2713\u5df2\u89e3\u9501</div>'
        : '<div style="position:absolute;top:-8px;right:-8px;background:#999;color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:4px">\ud83d\udd12\u672a\u89e3\u9501</div>';
      const icon = i === 0 ? '\ud83d\udde1\ufe0f' : (n.isUnlocked ? '\u2694\ufe0f' : '\ud83d\udd12');
      const name = n.name && n.name.includes('???') ? '???' : (n.name || '???');
      return '<div style="text-align:center;flex:1;min-width:110px;max-width:150px">' +
        '<div class="' + cls + '" style="border-radius:10px;padding:10px;border:2px solid;position:relative;cursor:pointer" ' +
        'onclick="' + (it ? 'openEquipDetail(\'' + it.name.replace(/'/g, '') + '\')' : '') + '">' +
        badge +
        '<div style="font-size:0.62rem;color:#888;margin-bottom:4px">' + tierLabel + '</div>' +
        '<div style="font-size:1.5rem;margin-bottom:4px;opacity:' + (n.isUnlocked ? '1' : '0.3') + '">' + icon + '</div>' +
        '<div style="font-weight:bold;font-size:0.85rem;margin-bottom:3px" class="' + qi.text + '">' + name + '</div>' +
        '<div style="font-size:0.65rem;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:2px" class="' + cls + '">' + qi.label + '</div>' +
        '</div>' +
        (note && !/^$|^—$/.test(note) ? '<div style="font-size:0.65rem;color:#888;margin-top:4px;line-height:1.3">' + note + '</div>' : '') +
        (i < nodes.length - 1 ? '<div style="color:#ccc;font-size:1.2rem;margin:3px 0">\u2193</div>' : '') +
        '</div>';
    }).join('') + '</div>';
}

      ${chapters.map(([title,content])=>{
        const done=content.includes('✅');
        return '<div class="doc"><div class="doc-head">'+title+' <span style="color:#'+(done?'396':'996')+';font-size:0.78rem;font-weight:normal">'+(done?'✅ 已完成':'▪️ 进行中')+'</span></div><div class="doc-body"><div style="font-size:0.84rem;line-height:1.7">'+content.replace(/\n/g,'<br>').slice(0,500)+'</div></div></div>';
      }).join('')}`;
  })();

  // === 生物图鉴 ===
  (()=>{
    const monsters=[];
    const blocks=(d.bestiary||'').split(/^##\s+/m);blocks.shift();
    blocks.forEach((b,i)=>{
      const lines=b.split('\n'),name=lines[0].trim(),rest=lines.slice(1).join('\n');
      const kvs=kv(rest);
      const sections=[];
      rest.split(/\*\*(.+?)\*\*/).forEach((part,j)=>{
        if(j%2===1)sections.push({title:part.trim(),content:''});
        else if(sections.length&&part.trim())sections[sections.length-1].content+=part;
      });
      monsters.push({name,kvs,sections});
    });

    function monsterDetail(idx){
      const m=monsters[idx];if(!m)return;
      const overlay=document.getElementById('bestiary-overlay');
      overlay.innerHTML='<div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:1rem;font-weight:normal">🐾 '+m.name+'</h2><button onclick="closeMonster()" style="background:none;border:1px solid #ccc;padding:4px 12px;cursor:pointer;font-size:0.82rem;border-radius:4px">✕ 关闭</button></div>'+
        m.sections.map(s=>{
          const lines=s.content.split('\n').filter(l=>l.trim());
          const items=lines.map(l=>l.replace(/^- /,'').trim()).filter(Boolean);
          return '<div class="doc"><div class="doc-head">'+s.title+'</div><div class="doc-body">'+
            (s.title==='基本信息'||s.title==='战斗数据'||s.title==='弱点'||s.title==='掉落素材'
              ?'<div class="grid-2">'+items.map(i=>{
                  const p=i.match(/(.+?)[：:](.+)/);
                  return p?'<div class="item"><strong>'+p[1].trim()+'</strong><br><span>'+p[2].trim()+'</span></div>':'<div class="item"><span>'+i+'</span></div>';
                }).join('')+'</div>'
              :'<div style="font-size:0.84rem;line-height:1.8;white-space:pre-wrap">'+s.content.replace(/^- /gm,'• ').trim()+'</div>')+
            '</div></div>';
        }).join('')+'</div></div>';
      overlay.style.display='flex';
    }
    window.closeMonster=function(){document.getElementById('bestiary-overlay').style.display='none'};
    window.openMonster=monsterDetail;

    document.getElementById('p-bestiary').innerHTML='<div class="grid-3" style="margin-bottom:16px">'+monsters.map((m,i)=>{
      return '<div class="doc" style="margin-bottom:0;cursor:pointer" onclick="openMonster('+i+')"><div class="doc-head">🐾 '+m.name+'</div><div class="doc-body">'+
        (m.kvs['等级范围']||m.kvs['类型']?'<div style="color:#999;font-size:0.78rem;margin-bottom:6px">'+(m.kvs['等级范围']||'')+' · '+(m.kvs['类型']||'')+'</div>':'')+
        (m.kvs['习性']?'<div style="color:#666;font-size:0.82rem">'+m.kvs['习性']+'</div>':'')+
        '<div style="text-align:right;margin-top:8px;color:#999;font-size:0.78rem">点击查看详情 →</div></div></div>';
    }).join('')+'</div><div id="bestiary-overlay"></div>';
  })();

  // === 组织 ===
  (()=>{
    const orgs=[];
    const blocks=(d.organizations||'').split(/^##\s+/m);blocks.shift();
    blocks.forEach(b=>{
      const lines=b.split('\n'),name=lines[0].trim(),rest=lines.slice(1).join('\n');
      const tblKvs={};
      rest.split('\n').forEach(l=>{
        if(l.startsWith('|')&&l.endsWith('|')){
          const cells=l.split('|').filter(c=>c.trim());
          if(cells.length>=2&&!cells[0].startsWith('项目')&&!cells[0].startsWith('---')&&!cells[0].match(/^-{3,}$/)){
            tblKvs[cells[0].replace(/\*\*/g,'').trim()]=cells[1].trim();
          }
        }
      });
      const sections=[];
      rest.split(/\*\*(.+?)\*\*/).forEach((part,j)=>{
        if(j%2===1)sections.push({title:part.trim(),content:''});
        else if(sections.length&&part.trim())sections[sections.length-1].content+=part;
      });
      orgs.push({name,kvs:tblKvs,sections});
    });

    function orgDetail(idx){
      const o=orgs[idx];if(!o)return;
      const overlay=document.getElementById('org-overlay');
      overlay.innerHTML='<div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:1rem;font-weight:normal">🏛 '+o.name+'</h2><button onclick="closeOrg()" style="background:none;border:1px solid #ccc;padding:4px 12px;cursor:pointer;font-size:0.82rem;border-radius:4px">✕ 关闭</button></div>'+
        '<div class="doc"><div class="doc-head">📋 基础档案</div><div class="doc-body"><div class="grid-2">'+
        Object.entries(o.kvs).map(([k,v])=>'<div class="item"><strong>'+k+'</strong><br><span>'+v+'</span></div>').join('')+'</div></div></div>'+
        o.sections.map(s=>{
          const items=s.content.split('\n').filter(l=>l.trim()&&!l.includes('---'));
          const listItems=items.filter(l=>l.startsWith('-')).map(l=>l.replace(/^- /,'').trim());
          const textItems=items.filter(l=>!l.startsWith('-'));
          return '<div class="doc"><div class="doc-head">'+s.title+'</div><div class="doc-body">'+
            (textItems.length?'<div style="font-size:0.84rem;line-height:1.8;margin-bottom:8px">'+textItems.join('\n').trim()+'</div>':'')+
            (listItems.length?'<div style="font-size:0.82rem">'+listItems.map(i=>'<div style="margin-bottom:4px">• '+i+'</div>').join('')+'</div>':'')+'</div></div>';
        }).join('')+'</div></div>';
      overlay.style.display='flex';
    }
    window.closeOrg=function(){document.getElementById('org-overlay').style.display='none'};
    window.openOrg=orgDetail;

    document.getElementById('p-organizations').innerHTML='<div class="grid-3" style="margin-bottom:16px">'+orgs.map((o,i)=>{
      const known=o.kvs['已知程度']||'';
      const stars=known.match(/⭐+/);
      const starText=stars?stars[0]:'⭐';
      return '<div class="doc" style="margin-bottom:0;cursor:pointer" onclick="openOrg('+i+')"><div class="doc-head">🏛 '+o.name+' <span style="color:#c90;font-size:0.75rem;font-weight:normal">'+starText+'</span></div><div class="doc-body">'+
        '<div style="color:#888;font-size:0.78rem;margin-bottom:4px">'+(o.kvs['类型']||'')+(o.kvs['活动区域']?' · '+o.kvs['活动区域']:'')+'</div>'+
        (o.kvs['成员规模']?'<div style="color:#666;font-size:0.8rem">👥 '+o.kvs['成员规模']+'</div>':'')+
        (o.kvs['负责人']&&o.kvs['负责人']!=='未知'?'<div style="color:#666;font-size:0.8rem">👤 '+o.kvs['负责人']+'</div>':'')+
        '<div style="text-align:right;margin-top:8px;color:#999;font-size:0.78rem">点击查看详情 →</div></div></div>';
    }).join('')+'</div><div id="org-overlay"></div>';
  })();

  // === 世界观 ===
  (()=>{
    const text=d.world||'';
    const sections=text.split(/^##\s+/m).filter(Boolean);
    const dataSections=sections.map(s=>{
      const lines=s.split('\n');
      const title=lines[0].replace(/^[一二三四五六七八九十]+、/,'').trim();
      const body=lines.slice(1).join('\n').trim();
      const tables=[];
      const restLines=[];
      let inT=false,cur=[];
      body.split('\n').forEach(l=>{
        if(l.startsWith('|')&&l.endsWith('|')){cur.push(l);inT=true}
        else{if(inT){tables.push(cur);cur=[];inT=false}restLines.push(l)}
      });
      if(cur.length)tables.push(cur);
      return {title,body,tables,rest:restLines.filter(l=>!l.match(/^---$|^>/)).join('\n').trim()};
    });

    document.getElementById('p-world').innerHTML=dataSections.filter(s=>s.body).map(s=>{
      return '<div class="doc"><div class="doc-head">'+s.title+'</div><div class="doc-body">'+
        (s.rest?'<div style="font-size:0.84rem;line-height:1.7;margin-bottom:12px;white-space:pre-wrap">'+s.rest.replace(/^- (.+)/gm,'• $1').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'<br><br>')+'</div>':'')+
        s.tables.map(t=>{
          const hd=t[0].split('|').filter(c=>c.trim()).map(c=>c.trim());
          const rows=t.slice(2).map(r=>r.split('|').filter(c=>c.trim()).map(c=>c.trim()));
          if(!hd.length)return '';
          return '<table><thead><tr>'+hd.map(h=>'<th>'+h.replace(/\*\*/g,'')+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+c.replace(/\*\*/g,'')+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
        }).join('')+'</div></div>';
    }).join('');
  })();

  const ap=localStorage.getItem('p')||'eriya';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.p===ap));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+ap));
  document.getElementById('ft').textContent='最后更新: '+new Date().toLocaleString('zh-CN');
}
loadAll();
</script>
</body>
</html>
